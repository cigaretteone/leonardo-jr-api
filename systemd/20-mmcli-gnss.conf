[Service]
# Phase 16: modem-ready 待ちループ (script-file 方式、最大 4分)
# - prefix で失敗許容、4分超過でも fall-through
ExecStartPre=-/usr/local/bin/wait-modem-ready.sh
# AGPS/GNSS 有効化 (modem ready 後なので engine busy にならない期待)
ExecStartPre=-/usr/bin/mmcli -m 0 --location-set-supl-server=supl.google.com:7276
ExecStartPre=-/usr/bin/mmcli -m 0 --location-enable-agps-msb
ExecStartPre=-/usr/bin/mmcli -m 0 --location-enable-gps-nmea
ExecStartPre=-/usr/bin/mmcli -m 0 --location-enable-gps-raw
