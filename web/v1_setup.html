<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Leonardo Jr. セットアップ</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  margin: 0; padding: 24px;
  background: #f5f5f7; color: #1d1d1f;
  min-height: 100vh;
}
.container {
  max-width: 420px; margin: 0 auto;
  background: white; border-radius: 12px;
  padding: 32px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
h1 { font-size: 20px; margin: 0 0 8px; }
.device-id {
  font-family: ui-monospace, "SF Mono", monospace;
  font-size: 13px; color: #666;
  margin-bottom: 24px;
}
label { display: block; font-size: 14px; margin-bottom: 8px; color: #333; }
input[type="tel"] {
  width: 100%; padding: 14px;
  font-size: 24px; letter-spacing: 8px; text-align: center;
  border: 1px solid #d2d2d7; border-radius: 8px;
  font-family: ui-monospace, monospace;
}
input[type="tel"]:focus { outline: none; border-color: #0071e3; }
button {
  width: 100%; padding: 14px;
  margin-top: 16px; font-size: 16px; font-weight: 600;
  background: #0071e3; color: white;
  border: none; border-radius: 8px;
  cursor: pointer;
}
button:disabled { background: #aaa; cursor: not-allowed; }
.error {
  margin-top: 12px; padding: 12px;
  background: #ffe5e5; color: #c00;
  border-radius: 6px; font-size: 14px;
  display: none;
}
.error.show { display: block; }
.hint {
  margin-top: 16px; font-size: 12px; color: #999;
  text-align: center;
}
</style>
</head>
<body>
<div class="container">
  <h1>Leonardo Jr. セットアップ</h1>
  <div class="device-id" id="device-id"></div>
  <label for="pin">本体ラベルの 6 桁 PIN を入力してください</label>
  <input type="tel" id="pin" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="off">
  <button id="submit">認証する</button>
  <div class="error" id="error"></div>
  <div class="hint">PIN は本体側面の QR ラベルに記載されています</div>
</div>
<script>
// LIFF init: liff.state があれば自動で manage 画面へ遷移する
// LIFF_ID は manage 画面の /api/v1/setup/{device_id}/config から取得できるが、
// この時点では未認証なので config API は呼べない。
// 代わりに環境変数を埋め込んだ固定 LIFF_ID をハードコードする方式は避け、
// 認証不要の専用エンドポイントを作る代わりに、ここでは liff.init を
// パラメータ付き URL の場合のみ実行する。
(async function liffBootstrap() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('liff.state') && !params.has('liffClientId')) {
    return;  // LIFF 経由でないアクセスはスキップ
  }
  if (typeof liff === 'undefined') return;

  // liffClientId クエリパラメータから LIFF_ID を取得
  // (LIFF が cold start 時に付与する形式: liffClientId=<channel_id>)
  // ただしこれは正確な LIFF ID とは異なる場合があるため、
  // /api/v1/setup/{device_id}/liff_id 形式の認証不要エンドポイントを
  // 別途用意する方が安全。
  // 暫定対応: liff.state があれば manage 画面に手動 redirect する。
  const liffState = params.get('liff.state');
  if (liffState) {
    // liff.state は URL エンコードされたパス (例: /manage?liff.hback=2)
    // これを manage 画面の URL に変換して遷移
    const decodedPath = decodeURIComponent(liffState);
    if (decodedPath.startsWith('/manage')) {
      // 現在の URL をベースに manage 画面 URL を構築
      const segments = window.location.pathname.split('/').filter(Boolean);
      const did = segments[1];
      window.location.replace(`/setup-v1/${did}/manage${decodedPath.replace("/manage", "")}`);
      return;
    }
  }
})();

const deviceId = window.location.pathname.split('/').filter(Boolean)[1];
document.getElementById('device-id').textContent = deviceId;

const pinInput = document.getElementById('pin');
const submitBtn = document.getElementById('submit');
const errorBox = document.getElementById('error');

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('show');
}

function hideError() {
  errorBox.classList.remove('show');
}

submitBtn.addEventListener('click', async () => {
  hideError();
  const pin = pinInput.value.trim();
  if (!/^\d{6}$/.test(pin)) {
    showError('6 桁の数字を入力してください');
    return;
  }
  submitBtn.disabled = true;
  try {
    const res = await fetch(`/api/v1/setup/${deviceId}/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ pin })
    });
    if (res.ok) {
      window.location.href = `/setup-v1/${deviceId}/manage`;
      return;
    }
    const data = await res.json().catch(() => ({}));
    if (res.status === 401) {
      showError(data.detail || 'PIN が正しくありません');
    } else if (res.status === 429) {
      showError(data.detail || 'ロック中です。しばらく待って再試行してください');
    } else if (res.status === 404) {
      showError('デバイスが見つかりません');
    } else {
      showError('認証エラー (' + res.status + ')');
    }
  } catch (e) {
    showError('通信エラーが発生しました');
  } finally {
    submitBtn.disabled = false;
  }
});

pinInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') submitBtn.click();
});
</script>
</body>
</html>
