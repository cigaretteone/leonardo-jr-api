<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>通知先管理 - Leonardo Jr.</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  margin: 0; padding: 24px;
  background: #f5f5f7; color: #1d1d1f;
  min-height: 100vh;
}
.container {
  max-width: 480px; margin: 0 auto;
  background: white; border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
h1 { font-size: 18px; margin: 0 0 4px; }
.device-id {
  font-family: ui-monospace, monospace;
  font-size: 12px; color: #666;
  margin-bottom: 20px;
}
.section { margin-bottom: 24px; }
.section h2 { font-size: 14px; margin: 0 0 12px; color: #555; }
.subscriber-list { list-style: none; padding: 0; margin: 0; }
.subscriber-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; background: #f9f9fb;
  border-radius: 8px; margin-bottom: 8px;
}
.subscriber-info { flex: 1; min-width: 0; }
.subscriber-channel {
  display: inline-block; padding: 2px 8px;
  background: #e5e5ea; border-radius: 4px;
  font-size: 11px; font-weight: 600; margin-right: 8px;
}
.subscriber-target {
  font-size: 14px; word-break: break-all;
}
.subscriber-label {
  font-size: 12px; color: #888; margin-top: 2px;
}
.btn-delete {
  padding: 6px 12px; font-size: 13px;
  background: #ff3b30; color: white;
  border: none; border-radius: 6px; cursor: pointer;
}
.empty {
  padding: 16px; text-align: center; color: #999;
  font-size: 14px; background: #f9f9fb; border-radius: 8px;
}
.add-form select, .add-form input {
  width: 100%; padding: 12px; font-size: 14px;
  border: 1px solid #d2d2d7; border-radius: 8px;
  margin-bottom: 8px;
}
.btn-primary {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
  background: #0071e3; color: white; border: none; border-radius: 8px;
  cursor: pointer;
}
.btn-secondary {
  width: 100%; padding: 12px; font-size: 14px;
  background: white; color: #ff3b30;
  border: 1px solid #ff3b30; border-radius: 8px;
  cursor: pointer; margin-top: 8px;
}
.btn-test {
  width: 100%; padding: 12px; font-size: 14px;
  background: white; color: #0071e3;
  border: 1px solid #0071e3; border-radius: 8px;
  cursor: pointer;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 12px 20px; background: #1d1d1f; color: white;
  border-radius: 8px; font-size: 14px;
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>通知先管理</h1>
  <div class="device-id" id="device-id"></div>

  <div class="section">
    <h2>登録済みの通知先</h2>
    <ul class="subscriber-list" id="list"></ul>
  </div>

  <div class="section">
    <h2>新規追加</h2>
    <div class="add-form">
      <select id="channel">
        <option value="line">LINE</option>
        <option value="email">メール</option>
        <option value="phone">電話</option>
      </select>
      <input type="text" id="target" placeholder="LINE userId / メール / +81xxx">
      <input type="text" id="label" placeholder="ラベル (任意、例: 田中さん)">
      <button class="btn-primary" id="add-btn">追加</button>
    </div>
  </div>

  <div class="section">
    <h2>動作確認</h2>
    <button class="btn-test" id="test-btn">テスト通知を送信</button>
  </div>

  <div class="section">
    <h2>リセット</h2>
    <button class="btn-secondary" id="reset-btn">全通知先を削除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const segments = window.location.pathname.split('/').filter(Boolean);
const deviceId = segments[1];
document.getElementById('device-id').textContent = deviceId;

const listEl = document.getElementById('list');
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

async function api(path, opts = {}) {
  const res = await fetch(`/api/v1/setup/${deviceId}${path}`, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (res.status === 401) {
    window.location.href = `/setup-v1/${deviceId}`;
    throw new Error('unauthorized');
  }
  return res;
}

async function load() {
  const res = await api('/subscribers');
  if (!res.ok) {
    listEl.innerHTML = '<div class="empty">読み込みに失敗しました</div>';
    return;
  }
  const items = await res.json();
  if (items.length === 0) {
    listEl.innerHTML = '<div class="empty">通知先が登録されていません</div>';
    return;
  }
  listEl.innerHTML = '';
  items.forEach(item => {
    const li = document.createElement('li');
    li.className = 'subscriber-item';
    li.innerHTML = `
      <div class="subscriber-info">
        <span class="subscriber-channel">${item.channel}</span>
        <span class="subscriber-target">${escapeHtml(item.target)}</span>
        ${item.label ? `<div class="subscriber-label">${escapeHtml(item.label)}</div>` : ''}
      </div>
      <button class="btn-delete" data-id="${item.id}">削除</button>
    `;
    listEl.appendChild(li);
  });
  listEl.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => del(parseInt(btn.dataset.id)));
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.getElementById('add-btn').addEventListener('click', async () => {
  const channel = document.getElementById('channel').value;
  const target = document.getElementById('target').value.trim();
  const label = document.getElementById('label').value.trim();
  if (!target) {
    toast('通知先を入力してください');
    return;
  }
  const res = await api('/subscribers', {
    method: 'POST',
    body: JSON.stringify({ channel, target, label: label || null })
  });
  if (res.ok) {
    document.getElementById('target').value = '';
    document.getElementById('label').value = '';
    toast('追加しました');
    load();
  } else if (res.status === 409) {
    toast('同じ通知先がすでに登録されています');
  } else {
    toast('追加に失敗しました');
  }
});

async function del(id) {
  if (!confirm('この通知先を削除しますか?')) return;
  const res = await api(`/subscribers/${id}`, { method: 'DELETE' });
  if (res.ok) {
    toast('削除しました');
    load();
  } else {
    toast('削除に失敗しました');
  }
}

document.getElementById('test-btn').addEventListener('click', async () => {
  const res = await api('/test', { method: 'POST' });
  if (res.ok) {
    toast('テスト通知を送信しました');
  } else if (res.status === 501) {
    toast('テスト通知は Phase 21 で実装予定');
  } else {
    toast('送信に失敗しました');
  }
});

document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('全通知先を削除します。本当によろしいですか?\n\nこの操作は取り消せません。')) return;
  if (!confirm('もう一度確認します。本当に全削除しますか?')) return;
  const res = await api('/reset', { method: 'POST' });
  if (res.ok) {
    toast('全通知先を削除しました');
    load();
  } else {
    toast('削除に失敗しました');
  }
});

load();
</script>
</body>
</html>
